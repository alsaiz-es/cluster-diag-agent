# /opt/css_diag_agent/diagnet.conf — Configuración compartida DiagNet/VmWatch
# Este fichero es sourceado por diagnet.sh, vmwatch.sh y diagnet_alert.sh.
# Editar aquí en lugar de modificar los scripts.

# --- Peers (IPs de los nodos del cluster, separadas por espacio) ---
PEER_IPS="10.0.0.1 10.0.0.2"

# --- Puerto del echo server ---
PEER_PORT=9400

# --- diagnet.sh ---
# Nombres a resolver para sonda DNS (separados por espacio, vacío = deshabilitado)
DNS_TARGETS="google.com"
DNS_THRESH_MS=200
PERIOD_SEC=5
PING_THRESH_MS=50
TCP_THRESH_MS=300
ECHO_THRESH_MS=500
TRIGGER_COOLDOWN_SEC=300

# --- vmwatch.sh ---
PERIOD_MS=1000
JITTER_THRESHOLD_MS=200
NET_EVERY=3
DISK_EVERY=10

# --- diagnet_alert.sh ---
DIAGNOSTIC_WINDOW_MIN=15
