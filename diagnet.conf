# /opt/css_diag_agent/diagnet.conf — Shared configuration for DiagNet/VmWatch
# This file is sourced by diagnet.sh, vmwatch.sh and diagnet_alert.sh.
# Edit here instead of modifying the scripts directly.

# --- Peers (cluster node IPs, space-separated) ---
PEER_IPS="10.0.0.1 10.0.0.2"

# --- Echo server port ---
PEER_PORT=9400

# --- diagnet.sh ---
# DNS names to resolve (space-separated, empty = disabled)
DNS_TARGETS="google.com"
DNS_THRESH_MS=200
PERIOD_SEC=5
PING_THRESH_MS=50
TCP_THRESH_MS=300
ECHO_THRESH_MS=500
TRIGGER_COOLDOWN_SEC=300

# --- vmwatch.sh ---
PERIOD_MS=1000
JITTER_THRESHOLD_MS=200
NET_EVERY=3
DISK_EVERY=10

# --- diagnet_alert.sh ---
DIAGNOSTIC_WINDOW_MIN=15
